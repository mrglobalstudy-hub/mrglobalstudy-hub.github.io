
<!DOCTYPE html>
<html>
<head>
<title>MR Global Study</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
.header{background:linear-gradient(45deg,#6a11cb,#2575fc);color:white;padding:15px;text-align:center}
.container{padding:15px}
.card{background:white;padding:15px;margin:10px 0;border-radius:12px}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;background:#6a11cb;color:white}
.hidden{display:none}
.video{width:100%;border-radius:10px}
</style>
</head>

<body>

<div class="header"><h2>MR Global Study</h2></div>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

<!-- LEVEL 1 -->
<div id="home">
<h3>📚 Select Category</h3>

<div class="card">
<button onclick="openSection('1to8')">Class 1–8</button>
<button onclick="openSection('9to12')">Class 9–12</button>
<button onclick="openSection('jee')">JEE</button>
<button onclick="openSection('neet')">NEET</button>
</div>
</div>

<!-- LEVEL 2 -->
<div id="classes" class="hidden"></div>

<!-- LEVEL 3 -->
<div id="subjects" class="hidden"></div>

<!-- LEVEL 4 -->
<div id="content" class="hidden"></div>

</div>

</div>

<script>

// Firebase
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBRTi1JBNkxZHb3DvJLpsyFpJDFhFN-p3w",
  authDomain: "mr-global-study.firebaseapp.com",
  projectId: "mr-global-study",
  storageBucket: "mr-global-study.firebasestorage.app",
  messagingSenderId: "313129965677",
  appId: "1:313129965677:web:dc66b51b377a7005c10764",
  measurementId: "G-1GV376WRVC"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN SYSTEM
function signup(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>alert("Signup Success"))
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
loginBox.style.display="none";
main.classList.remove("hidden");
})
.catch(e=>alert(e.message));
}

// LEVEL 2: CLASSES
function openSection(type){
home.style.display="none";
classes.classList.remove("hidden");

let html="";

if(type=="1to8"){
for(let i=1;i<=8;i++){
html+=`<div class="card">
<button onclick="openSubjects('Class ${i}')">Class ${i}</button>
</div>`;
}
}

if(type=="9to12"){
for(let i=9;i<=12;i++){
html+=`<div class="card">
<button onclick="openSubjects('Class ${i}')">Class ${i}</button>
</div>`;
}
}

if(type=="jee" || type=="neet"){
html+=`<div class="card">
<button onclick="openSubjects('${type.toUpperCase()}')">${type.toUpperCase()}</button>
</div>`;
}

classes.innerHTML=html;
}

// LEVEL 3: SUBJECTS
function openSubjects(className){
classes.style.display="none";
subjects.classList.remove("hidden");

let subs=["Maths","Science","English","Physics","Chemistry","Biology"];

let html=`<h3>${className}</h3>`;

subs.forEach(s=>{
html+=`<div class="card">
<button onclick="openContent('${className}','${s}')">${s}</button>
</div>`;
});

subjects.innerHTML=html;
}

// LEVEL 4: CONTENT
function openContent(cls,sub){
subjects.style.display="none";
content.classList.remove("hidden");

content.innerHTML=`
<h3>${cls} - ${sub}</h3>

<div class="card">
<h4>📺 Lecture Video</h4>
<video class="video" controls src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
</div>

<div class="card">
<h4>📄 Notes</h4>
<button onclick="alert('Download Notes')">Download Notes</button>
</div>

<div class="card">
<h4>📝 Homework</h4>
<button onclick="alert('Homework Open')">Open Homework</button>
</div>

<div class="card">
<h4>❓ Doubt</h4>
<button onclick="alert('Ask Doubt')">Ask Doubt</button>
</div>

<div class="card">
<h4>✅ Solution</h4>
<button onclick="alert('View Solution')">View Solution</button>
</div>

<button onclick="location.reload()">⬅ Back</button>
`;
}

</script>

</body>
</html>
