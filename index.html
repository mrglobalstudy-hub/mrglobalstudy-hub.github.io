
<!DOCTYPE html>
<html>
<head>
<title>MR Global Study (PW Clone)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
.header{background:linear-gradient(45deg,#6a11cb,#2575fc);color:white;padding:15px;text-align:center}
.container{padding:15px}
.card{background:white;padding:15px;margin:10px 0;border-radius:12px}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;background:#6a11cb;color:white}
.hidden{display:none}
.video{width:100%;border-radius:10px}
.logout{background:red}
</style>
</head>

<body>

<div class="header">
<h2>MR Global Study</h2>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email"><br>
<input id="password" type="password"><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

<h3>📚 Courses</h3>
<div id="courseList"></div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
<h3>👨‍💻 Admin Panel</h3>
<input id="title" placeholder="Course Title">
<input id="video" placeholder="Video URL">
<select id="type">
<option value="free">Free</option>
<option value="paid">Paid</option>
</select>
<button onclick="uploadCourse()">Upload Course</button>
</div>

</div>

</div>

<script>

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBRTi1JBNkxZHb3DvJLpsyFpJDFhFN-p3w",
  authDomain: "mr-global-study.firebaseapp.com",
  projectId: "mr-global-study",
  storageBucket: "mr-global-study.appspot.com",
  messagingSenderId: "313129965677",
  appId: "1:313129965677:web:dc66b51b377a7005c10764",
  measurementId: "G-1GV376WRVC"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 🔥 ADMIN EMAIL
const ADMIN = "admin@gmail.com";

// SIGNUP
function signup(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>alert("Signup Success"))
.catch(e=>alert(e.message));
}

// LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

// LOGOUT
function logout(){
auth.signOut().then(()=>location.reload());
}

// AUTO LOGIN
auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("loginBox").style.display="none";
document.getElementById("main").classList.remove("hidden");
showHome();
}else{
document.getElementById("loginBox").style.display="block";
document.getElementById("main").classList.add("hidden");
}
});

if(user.email===ADMIN){
adminPanel.classList.remove("hidden");
}

loadCourses();

}else{
loginBox.style.display="block";
main.classList.add("hidden");
}
});

// 🔥 UPLOAD COURSE
function uploadCourse(){
db.collection("courses").add({
title:title.value,
video:video.value,
type:type.value
});
alert("Course Uploaded ✅");
loadCourses();
}

// 🔥 LOAD COURSES
function loadCourses(){
db.collection("courses").get().then(snapshot=>{
let html="";

snapshot.forEach(doc=>{
let c=doc.data();

if(c.type==="paid"){
html+=`
<div class="card">
<h4>${c.title}</h4>
<button onclick="buy()">💰 Buy Course</button>
</div>`;
}else{
html+=`
<div class="card">
<h4>${c.title}</h4>
<video class="video" controls src="${c.video}"></video>
</div>`;
}

});

courseList.innerHTML=html;
});
}

// 💰 PAYMENT (Demo)
function buy(){
alert("Razorpay connect karo next step me 💰");
}

</script>

</body>
</html>
