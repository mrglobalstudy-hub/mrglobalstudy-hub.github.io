
<!DOCTYPE html>
<html>
<head>
<title>MR Global Study</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
.header{background:linear-gradient(45deg,#6a11cb,#2575fc);color:white;padding:15px;text-align:center}
.container{padding:15px}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;background:#6a11cb;color:white}
.card{background:white;padding:10px;margin:10px 0;border-radius:10px}
.video{width:100%;border-radius:10px}
.nav{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:10px}
.hidden{display:none}
</style>
</head>

<body>

<div class="header">
<h2>MR Global Study</h2>
</div>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h3>Login / Signup</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
<h3>📚 Classes</h3>

<!-- DEFAULT COURSES -->
<div class="card">
<h4>Class 1–5 Basic</h4>
<video class="video" controls src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
</div>

<div class="card">
<h4>Class 6–8 Foundation</h4>
<video class="video" controls src="https://www.w3schools.com/html/movie.mp4"></video>
</div>

<div class="card">
<h4>Class 9–10 Maths</h4>
<video class="video" controls src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
</div>

<div class="card">
<h4>Class 11–12 Science</h4>
<video class="video" controls src="https://www.w3schools.com/html/movie.mp4"></video>
</div>

<h3>🔥 Uploaded Courses</h3>
<div id="courseList"></div>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
<h3>Admin Panel</h3>
<input id="courseTitle" placeholder="Course Title">
<input id="videoURL" placeholder="Video URL">
<button onclick="addCourse()">Upload Course</button>
</div>

</div>

<!-- NAVBAR -->
<div class="nav hidden" id="navbar">
<button onclick="showDashboard()">🏠</button>
<button onclick="showAdmin()">⚙️</button>
<button onclick="logout()">🚪</button>
</div>

<script>

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBRTi1JBNkxZHb3DvJLpsyFpJDFhFN-p3w",
  authDomain: "mr-global-study.firebaseapp.com",
  projectId: "mr-global-study",
  storageBucket: "mr-global-study.firebasestorage.app",
  messagingSenderId: "313129965677",
  appId: "1:313129965677:web:dc66b51b377a7005c10764",
  measurementId: "G-1GV376WRVC"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// SIGNUP
function signup(){
auth.createUserWithEmailAndPassword(email.value, password.value)
.then(()=>alert("Signup Success ✅"))
.catch(e=>alert(e.message));
}

// LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value, password.value)
.then(()=>initApp())
.catch(e=>alert(e.message));
}

// LOGOUT
function logout(){
auth.signOut();
location.reload();
}

// AFTER LOGIN
function initApp(){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
document.getElementById("navbar").classList.remove("hidden");

loadCourses();

// ADMIN CHECK
if(email.value=="admin@gmail.com"){
document.getElementById("adminPanel").classList.remove("hidden");
}
}

// ADD COURSE
function addCourse(){
db.collection("courses").add({
title: courseTitle.value,
video: videoURL.value
});
alert("Course Uploaded ✅");
}

// LOAD COURSES
function loadCourses(){
db.collection("courses").get().then(snapshot=>{
let html="";
snapshot.forEach(doc=>{
let c=doc.data();
html+=`
<div class="card">
<h4>${c.title}</h4>
<video class="video" controls src="${c.video}"></video>
</div>
`;
});
document.getElementById("courseList").innerHTML=html;
});
}

// NAVIGATION
function showDashboard(){
document.getElementById("dashboard").classList.remove("hidden");
document.getElementById("adminPanel").classList.add("hidden");
}

function showAdmin(){
document.getElementById("dashboard").classList.add("hidden");
document.getElementById("adminPanel").classList.remove("hidden");
}

</script>

</body>
</html>
